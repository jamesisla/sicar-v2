version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-sicar-v2}/backend:${IMAGE_TAG:-main}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-sicar-v2}/frontend:${IMAGE_TAG:-main}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:3001}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle_data:
